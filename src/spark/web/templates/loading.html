<!DOCTYPE html>
<html lang="en">
<head>
    <script>document.documentElement.setAttribute('data-bs-theme', localStorage.getItem('app-theme') || 'dark');</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spark - Loading</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="/static/css/cognisn.css" rel="stylesheet">
    <link href="/static/css/base.css" rel="stylesheet">
    <link href="/static/css/spark.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">
        <div style="text-align: center; max-width: 400px;">
            <!-- Cognisn icon -->
            <svg width="64" height="64" viewBox="0 0 130 130" fill="none" xmlns="http://www.w3.org/2000/svg" class="mb-4">
                <defs>
                    <linearGradient id="load-arc" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0%" stop-color="var(--app-accent-dark)"/>
                        <stop offset="50%" stop-color="var(--app-accent)"/>
                        <stop offset="100%" stop-color="var(--app-accent-dark)"/>
                    </linearGradient>
                    <radialGradient id="load-dot" cx="40%" cy="35%" r="60%">
                        <stop offset="0%" stop-color="var(--app-accent-light)"/>
                        <stop offset="100%" stop-color="var(--app-accent)"/>
                    </radialGradient>
                </defs>
                <g transform="translate(65,65)">
                    <line x1="-65" y1="0" x2="-46" y2="0" stroke="var(--app-accent)" stroke-width="0.8" opacity="0.28"/>
                    <line x1="46" y1="0" x2="65" y2="0" stroke="var(--app-accent)" stroke-width="0.8" opacity="0.14"/>
                    <line x1="0" y1="0" x2="33" y2="-42" stroke="var(--app-accent)" stroke-width="0.8" opacity="0.2"/>
                    <line x1="0" y1="0" x2="33" y2="42" stroke="var(--app-accent)" stroke-width="0.8" opacity="0.2"/>
                    <path d="M32 -48 A48 48 0 1 0 32 48" stroke="url(#load-arc)" stroke-width="4" fill="none" stroke-linecap="round"/>
                    <circle cx="32" cy="-48" r="5" fill="var(--app-accent-light)"/>
                    <circle cx="32" cy="48" r="5" fill="var(--app-accent)" opacity="0.85"/>
                    <circle cx="12" cy="0" r="9" fill="url(#load-dot)"/>
                    <circle cx="12" cy="0" r="4.5" fill="var(--app-accent-light)" opacity="0.9"/>
                </g>
            </svg>

            <h5 style="font-family: var(--app-font-heading); font-weight: 700; margin-bottom: 1.5rem;">
                <i class="bi bi-lightning-charge-fill" style="font-size: 0.875rem;"></i> Spark
            </h5>

            <div class="app-spinner mx-auto mb-3"></div>

            <p id="loading-stage" style="color: var(--app-text-secondary); font-size: 0.875rem;">
                Starting...
            </p>

            <div id="loading-error" style="display: none;" class="alert-app alert-app-danger mt-3">
                Initialisation failed. Check the terminal for details.
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/ui.js"></script>
    <script>
        let pollInterval = null;

        function pollStatus() {
            fetch('/loading/api/status')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('loading-stage').textContent = data.stage || 'Loading...';

                    if (data.ready) {
                        clearInterval(pollInterval);
                        document.getElementById('loading-stage').textContent = 'Ready — redirecting...';
                        setTimeout(() => { window.location.href = '/'; }, 500);
                    } else if (data.error) {
                        clearInterval(pollInterval);
                        document.getElementById('loading-error').style.display = 'block';
                        document.querySelector('.app-spinner').style.display = 'none';
                    }
                })
                .catch(() => {
                    // Server not ready yet, keep polling
                });
        }

        document.addEventListener('DOMContentLoaded', () => {
            pollInterval = setInterval(pollStatus, 800);
            pollStatus();
        });
    </script>
</body>
</html>
