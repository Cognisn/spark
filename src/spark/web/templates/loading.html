<!DOCTYPE html>
<html lang="en">
<head>
    <script>document.documentElement.setAttribute('data-bs-theme', localStorage.getItem('app-theme') || 'dark');</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spark - Starting</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="/static/css/cognisn.css" rel="stylesheet">
    <link href="/static/css/base.css" rel="stylesheet">
    <link href="/static/css/spark.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        .splash-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Subtle radial glow behind the icon */
        .splash-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(90, 170, 232, 0.08) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -60%);
            pointer-events: none;
        }

        /* Lightning bolt icon with pulse */
        .splash-icon {
            width: 80px;
            height: 80px;
            position: relative;
            z-index: 1;
            animation: splash-pulse 2.5s ease-in-out infinite;
        }

        @keyframes splash-pulse {
            0%, 100% { filter: drop-shadow(0 0 8px rgba(90, 170, 232, 0.3)); }
            50% { filter: drop-shadow(0 0 20px rgba(90, 170, 232, 0.5)); }
        }

        .splash-title {
            font-family: var(--app-font-heading, 'Syne', sans-serif);
            font-weight: 700;
            font-size: 1.75rem;
            color: var(--app-text-primary, #e8f0fa);
            margin-top: 1.25rem;
            letter-spacing: 0.02em;
            position: relative;
            z-index: 1;
        }

        .splash-subtitle {
            font-family: var(--app-font-body, 'DM Sans', sans-serif);
            font-size: 0.8rem;
            color: var(--app-text-secondary, rgba(232, 240, 250, 0.7));
            margin-top: 0.25rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            position: relative;
            z-index: 1;
        }

        /* Progress section */
        .splash-progress {
            margin-top: 2.5rem;
            text-align: center;
            position: relative;
            z-index: 1;
            min-height: 80px;
        }

        .splash-progress-bar {
            width: 240px;
            height: 3px;
            background: rgba(90, 170, 232, 0.1);
            border-radius: 2px;
            overflow: hidden;
            margin: 0 auto 1rem;
        }

        .splash-progress-fill {
            height: 100%;
            width: 30%;
            background: linear-gradient(90deg, var(--app-accent-dark, #3a78c4), var(--app-accent, #5aaae8));
            border-radius: 2px;
            animation: splash-progress 1.8s ease-in-out infinite;
        }

        @keyframes splash-progress {
            0% { width: 0%; margin-left: 0; }
            50% { width: 50%; margin-left: 25%; }
            100% { width: 0%; margin-left: 100%; }
        }

        #loading-stage {
            font-size: 0.8125rem;
            color: var(--app-text-secondary, rgba(232, 240, 250, 0.7));
            transition: opacity 0.3s ease;
        }

        #loading-error {
            max-width: 360px;
        }

        /* Cognisn footer */
        .splash-footer {
            position: absolute;
            bottom: 1.5rem;
            text-align: center;
            z-index: 1;
        }

        .splash-footer-text {
            font-size: 0.7rem;
            color: var(--app-text-muted, rgba(232, 240, 250, 0.4));
            letter-spacing: 0.03em;
        }

        .splash-footer-brand {
            color: var(--app-accent, #5aaae8);
            font-weight: 500;
        }

        /* Cognisn logo mark */
        .splash-cognisn-mark {
            opacity: 0.5;
            margin-bottom: 0.25rem;
        }

        /* Decorative grid lines (very subtle) */
        .splash-grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(90, 170, 232, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(90, 170, 232, 0.015) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <div class="splash-grid"></div>
        <div class="splash-glow"></div>

        <!-- Spark icon -->
        <div class="splash-icon">
            <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="bolt-grad" x1="0" y1="0" x2="0.5" y2="1">
                        <stop offset="0%" stop-color="#7ac0f8"/>
                        <stop offset="100%" stop-color="#5aaae8"/>
                    </linearGradient>
                </defs>
                <rect x="15" y="15" width="482" height="482" rx="92" fill="#080e1e"/>
                <polygon points="282,61 143,241 241,241 200,451 369,225 271,225" fill="url(#bolt-grad)"/>
            </svg>
        </div>

        <div class="splash-title">Spark</div>
        <div class="splash-subtitle">Secure Personal AI Research Kit</div>

        <div class="splash-progress">
            <div class="splash-progress-bar">
                <div class="splash-progress-fill"></div>
            </div>

            <p id="loading-stage">Starting...</p>

            <div id="loading-error" style="display: none;" class="alert-app alert-app-danger mt-3 mx-auto">
                Initialisation failed. Check the terminal for details.
            </div>
        </div>

        <div class="splash-footer">
            <!-- Cognisn logo mark (small) -->
            <div class="splash-cognisn-mark">
                <svg width="24" height="24" viewBox="0 0 130 130" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <g transform="translate(65,65)">
                        <path d="M32 -48 A48 48 0 1 0 32 48" stroke="var(--app-accent, #5aaae8)" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.6"/>
                        <circle cx="12" cy="0" r="6" fill="var(--app-accent, #5aaae8)" opacity="0.7"/>
                    </g>
                </svg>
            </div>
            <div class="splash-footer-text">by <span class="splash-footer-brand">Cognisn</span></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/ui.js"></script>
    <script>
        let pollInterval = null;
        const stageEl = document.getElementById('loading-stage');
        let lastStage = '';

        function pollStatus() {
            fetch('/loading/api/status')
                .then(r => r.json())
                .then(data => {
                    const stage = data.stage || 'Loading...';

                    // Fade transition on stage change
                    if (stage !== lastStage) {
                        stageEl.style.opacity = '0';
                        setTimeout(() => {
                            stageEl.textContent = stage;
                            stageEl.style.opacity = '1';
                        }, 150);
                        lastStage = stage;
                    }

                    if (data.ready) {
                        clearInterval(pollInterval);
                        stageEl.style.opacity = '0';
                        setTimeout(() => {
                            stageEl.textContent = 'Ready';
                            stageEl.style.opacity = '1';
                        }, 150);
                        // Brief pause to show "Ready" before redirect
                        setTimeout(() => { window.location.href = '/'; }, 600);
                    } else if (data.error) {
                        clearInterval(pollInterval);
                        document.getElementById('loading-error').style.display = 'block';
                        document.querySelector('.splash-progress-bar').style.display = 'none';
                    }
                })
                .catch(() => {
                    // Server not ready yet, keep polling
                });
        }

        document.addEventListener('DOMContentLoaded', () => {
            pollInterval = setInterval(pollStatus, 800);
            pollStatus();
        });
    </script>
</body>
</html>
