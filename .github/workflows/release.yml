name: Release

on:
  release:
    types: [published]

env:
  PYAPP_VERSION: "0.29.0-splash.4"
  PYAPP_FORK_REPO: "Cognisn/pyapp"
  PYTHON_VERSION: "3.12"

jobs:
  # Step 1: Build the Python wheel
  build-wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build tools
        run: pip install build

      - name: Build wheel
        run: python -m build

      - name: Upload wheel
        uses: actions/upload-artifact@v5
        with:
          name: wheel
          path: dist/*.whl

  # Step 2: Build PyApp binaries for all platforms
  build-binaries:
    needs: build-wheel
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-15
            name: spark-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-15
            name: spark-macos-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: spark-windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download wheel
        uses: actions/download-artifact@v5
        with:
          name: wheel
          path: dist/

      - name: Get wheel filename
        id: wheel
        shell: bash
        run: echo "filename=$(ls dist/*.whl | head -1)" >> $GITHUB_OUTPUT

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ matrix.variant }}

      - name: Download PyApp source (Cognisn fork with splash)
        shell: bash
        run: |
          curl -LO "https://github.com/${PYAPP_FORK_REPO}/archive/refs/tags/v${PYAPP_VERSION}.tar.gz"
          tar xzf v${PYAPP_VERSION}.tar.gz
          mv pyapp-${PYAPP_VERSION} pyapp-src

      - name: Copy wheel into build context
        shell: bash
        run: |
          WHEEL_NAME=$(basename ${{ steps.wheel.outputs.filename }})
          cp ${{ steps.wheel.outputs.filename }} pyapp-src/${WHEEL_NAME}
          echo "wheel_name=${WHEEL_NAME}" >> $GITHUB_OUTPUT
        id: copy_wheel

      - name: Set PyApp build configuration
        id: pyapp_config
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            # Windows: use IS_GUI=0 (python.exe) because pythonw.exe
            # swallows errors and breaks uvicorn. The NSIS installer
            # hides the console via a VBS launcher script.
            echo "is_gui=0" >> $GITHUB_OUTPUT
          else
            echo "is_gui=1" >> $GITHUB_OUTPUT
          fi

      - name: Generate icons and splash image
        run: |
          pip install Pillow
          python assets/generate_icons.py
          python assets/generate_installer_assets.py
          python assets/generate_splash.py
          cp assets/installer/splash-screen.png pyapp-src/splash-screen.png

      - name: Build PyApp binary
        shell: bash
        env:
          PYAPP_PROJECT_NAME: cognisn-spark
          PYAPP_PROJECT_VERSION: ${{ github.event.release.tag_name }}
          PYAPP_PROJECT_PATH: ${{ github.workspace }}/pyapp-src/${{ steps.copy_wheel.outputs.wheel_name }}
          PYAPP_EXEC_SPEC: spark.launch:main
          PYAPP_PYTHON_VERSION: ${{ env.PYTHON_VERSION }}
          PYAPP_DISTRIBUTION_EMBED: "1"
          PYAPP_IS_GUI: ${{ steps.pyapp_config.outputs.is_gui }}
          PYAPP_METADATA_TEMPLATE: "Spark {version} by Cognisn"
          PYAPP_SPLASH_ENABLED: "true"
          PYAPP_SPLASH_IMAGE: ${{ github.workspace }}/pyapp-src/splash-screen.png
        run: |
          cd pyapp-src
          cargo build --release --features splash --target ${{ matrix.target }}

      - name: Prepare binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p release
          cp pyapp-src/target/${{ matrix.target }}/release/pyapp release/${{ matrix.name }}
          chmod +x release/${{ matrix.name }}

      - name: Prepare binary (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p release
          cp pyapp-src/target/${{ matrix.target }}/release/pyapp.exe release/${{ matrix.name }}.exe

      - name: Sign Windows binary
        if: runner.os == 'Windows'
        shell: bash
        env:
          SSL_COM_USERNAME: ${{ secrets.SSL_COM_USERNAME }}
          SSL_COM_PASSWORD: ${{ secrets.SSL_COM_PASSWORD }}
          SSL_COM_TOTP_SECRET: ${{ secrets.SSL_COM_TOTP_SECRET }}
          SSL_COM_CREDENTIAL_ID: ${{ secrets.SSL_COM_CREDENTIAL_ID }}
        run: |
          EXE_PATH="${GITHUB_WORKSPACE}/release/${{ matrix.name }}.exe"
          echo "Binary to sign: $EXE_PATH"
          echo "Binary size before signing: $(stat -c%s "$EXE_PATH" 2>/dev/null || stat -f%z "$EXE_PATH") bytes"

          # Skip signing if secrets are not configured
          if [ -z "$SSL_COM_USERNAME" ] || [ -z "$SSL_COM_CREDENTIAL_ID" ]; then
            echo "::warning::SSL.com secrets not configured — skipping code signing"
            exit 0
          fi

          # Download CodeSignTool
          curl -L --retry 3 --retry-delay 5 -o CodeSignTool.zip https://www.ssl.com/download/codesigntool-for-windows/
          # Verify we got a valid zip (not an HTML error page)
          file CodeSignTool.zip | grep -q "Zip archive" || { echo "::error::Downloaded file is not a valid zip"; file CodeSignTool.zip; exit 1; }
          unzip -o CodeSignTool.zip -d CodeSignTool

          # Find CodeSignTool.bat
          CST_BAT=$(find CodeSignTool -name "CodeSignTool.bat" | head -1)
          if [ -z "$CST_BAT" ]; then
            echo "::error::CodeSignTool.bat not found after extraction"
            find CodeSignTool -type f | head -20
            exit 1
          fi
          CST_DIR=$(dirname "$CST_BAT")
          echo "CodeSignTool found at: $CST_DIR"

          # Sign the binary — output to a temp dir then move back
          SIGNED_DIR="${GITHUB_WORKSPACE}/signed_output"
          mkdir -p "$SIGNED_DIR"

          cd "$CST_DIR"
          echo "Running CodeSignTool sign..."
          ./CodeSignTool.bat sign \
            -username="${SSL_COM_USERNAME}" \
            -password="${SSL_COM_PASSWORD}" \
            -totp_secret="${SSL_COM_TOTP_SECRET}" \
            -credential_id="${SSL_COM_CREDENTIAL_ID}" \
            -input_file_path="$EXE_PATH" \
            -output_dir_path="$SIGNED_DIR" \
            2>&1 | tee signing_output.log

          SIGN_EXIT=$?
          echo "CodeSignTool exit code: $SIGN_EXIT"

          # Check if signed file was produced
          SIGNED_FILE="$SIGNED_DIR/${{ matrix.name }}.exe"
          if [ -f "$SIGNED_FILE" ]; then
            echo "Signed binary found, replacing original..."
            cp "$SIGNED_FILE" "$EXE_PATH"
            echo "Binary size after signing: $(stat -c%s "$EXE_PATH" 2>/dev/null || stat -f%z "$EXE_PATH") bytes"
          else
            echo "::error::Signed binary not found at $SIGNED_FILE"
            ls -la "$SIGNED_DIR/" || true
            cat signing_output.log
            exit 1
          fi

          # Verify the signature using PowerShell
          echo "Verifying digital signature..."
          powershell -Command "Get-AuthenticodeSignature '$EXE_PATH' | Format-List" || true

      - name: Upload binary
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.name }}
          path: release/

  # Step 3: Create macOS .app bundles and DMG installers (all variants)
  create-macos-installer:
    needs: build-binaries
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            artifact: spark-macos-x86_64
            suffix: ""
          - arch: arm64
            artifact: spark-macos-arm64
            suffix: ""
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download binary
        uses: actions/download-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: binary/

      - name: Generate icons and installer assets
        run: |
          pip install Pillow
          python assets/generate_icons.py
          python assets/generate_installer_assets.py
          mkdir -p spark.iconset
          for size in 16 32 64 128 256 512; do
            cp assets/icons/spark-${size}.png spark.iconset/icon_${size}x${size}.png
          done
          cp assets/icons/spark-1024.png spark.iconset/icon_512x512@2x.png
          iconutil -c icns spark.iconset -o spark.icns

      - name: Create .app bundle
        env:
          VERSION: ${{ github.event.release.tag_name }}
        run: |
          APP="Spark.app"
          mkdir -p "${APP}/Contents/MacOS"
          mkdir -p "${APP}/Contents/Resources"

          # PyApp binary as the engine, launcher script as the main executable
          cp binary/${{ matrix.artifact }} "${APP}/Contents/MacOS/spark-engine"
          chmod +x "${APP}/Contents/MacOS/spark-engine"
          cp assets/macos/launcher.sh "${APP}/Contents/MacOS/spark"
          chmod +x "${APP}/Contents/MacOS/spark"

          cp spark.icns "${APP}/Contents/Resources/spark.icns"
          sed "s/VERSION/${VERSION}/g" assets/macos/Info.plist > "${APP}/Contents/Info.plist"

      - name: Import code signing certificate
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Decode certificate
          echo "${MACOS_CERTIFICATE_BASE64}" | base64 --decode > certificate.p12

          # Create temporary keychain
          security create-keychain -p "${KEYCHAIN_PASSWORD}" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" build.keychain

          # Import certificate
          security import certificate.p12 \
            -k build.keychain \
            -P "${MACOS_CERTIFICATE_PASSWORD}" \
            -T /usr/bin/codesign

          # Allow codesign access without prompts
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "${KEYCHAIN_PASSWORD}" \
            build.keychain

          rm -f certificate.p12

          # Verify certificate is available
          security find-identity -v -p codesigning build.keychain

      - name: Code sign app bundle
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Find the Developer ID Application identity
          IDENTITY=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "Signing with: ${IDENTITY}"

          # Sign the engine binary first, then the launcher, then the bundle
          /usr/bin/codesign --force --verify --verbose \
            --sign "${IDENTITY}" \
            --options runtime \
            --entitlements assets/macos/entitlements.plist \
            "Spark.app/Contents/MacOS/spark-engine"

          /usr/bin/codesign --force --verify --verbose \
            --sign "${IDENTITY}" \
            --options runtime \
            "Spark.app/Contents/MacOS/spark"

          /usr/bin/codesign --force --verify --verbose \
            --sign "${IDENTITY}" \
            --options runtime \
            --entitlements assets/macos/entitlements.plist \
            "Spark.app"

          # Verify
          codesign -vvv --deep --strict "Spark.app"

      - name: Create branded DMG
        env:
          VERSION: ${{ github.event.release.tag_name }}
          DMG_NAME: Spark-${{ github.event.release.tag_name }}-macos-${{ matrix.arch }}${{ matrix.suffix }}.dmg
        run: |
          # Install create-dmg for proper DMG layout
          brew install create-dmg

          # Stage the app in a clean directory to avoid extra files in DMG
          mkdir -p dmg-staging
          cp -R Spark.app dmg-staging/

          # create-dmg with custom background, icon positions, and Applications link
          create-dmg \
            --volname "Spark" \
            --volicon "spark.icns" \
            --background "assets/installer/dmg-background.png" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 80 \
            --icon "Spark.app" 180 260 \
            --hide-extension "Spark.app" \
            --app-drop-link 480 260 \
            --no-internet-enable \
            "${DMG_NAME}" \
            "dmg-staging/" \
          || true

          # Verify DMG was created
          ls -la "${DMG_NAME}"

      - name: Notarize DMG
        timeout-minutes: 30
        env:
          APPLE_ID_EMAIL: ${{ secrets.APPLE_ID_EMAIL }}
          APPLE_ID_APP_PASSWORD: ${{ secrets.APPLE_ID_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG_NAME="Spark-${{ github.event.release.tag_name }}-macos-${{ matrix.arch }}${{ matrix.suffix }}.dmg"

          # Store notarization credentials
          xcrun notarytool store-credentials "AC_PASSWORD" \
            --apple-id "${APPLE_ID_EMAIL}" \
            --team-id "${APPLE_TEAM_ID}" \
            --password "${APPLE_ID_APP_PASSWORD}"

          # Submit for notarization and wait (timeout handled by step timeout-minutes)
          echo "Submitting ${DMG_NAME} for notarization..."
          xcrun notarytool submit "${DMG_NAME}" \
            --keychain-profile "AC_PASSWORD" \
            --wait \
            --timeout 20m \
          && NOTARIZED=true || NOTARIZED=false

          if [ "${NOTARIZED}" = true ]; then
            echo "Notarization succeeded — stapling ticket"
            xcrun stapler staple "${DMG_NAME}"
            spctl -a -v -t open --context context:primary-signature "${DMG_NAME}" || true
          else
            echo "::warning::Notarization did not complete within timeout. The DMG is code-signed but not notarized. Users may need to right-click > Open on first launch."
          fi

      - name: Clean up keychain
        if: always()
        run: |
          security default-keychain -s login.keychain || true
          security delete-keychain build.keychain || true

      - name: Upload DMG
        uses: actions/upload-artifact@v5
        with:
          name: spark-dmg-${{ matrix.arch }}${{ matrix.suffix }}
          path: "*.dmg"

  # Step 4: Create Windows installer
  create-windows-installer:
    needs: build-binaries
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download binary
        uses: actions/download-artifact@v5
        with:
          name: spark-windows-x86_64
          path: binary/

      - name: Set up Python for icon generation
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Generate icons and installer assets
        run: |
          pip install Pillow
          python assets/generate_icons.py
          python assets/generate_installer_assets.py

      - name: Prepare binary for installer
        shell: bash
        run: |
          cd binary
          for f in *.exe; do
            if [ "$f" != "spark-windows-x86_64.exe" ]; then
              mv "$f" "spark-windows-x86_64.exe"
            fi
          done

      - name: Create VBS launcher script
        shell: bash
        run: |
          # VBS script hides the console window when launching spark-engine.exe
          cat > launcher.vbs <<'VBSEOF'
          Set WshShell = CreateObject("WScript.Shell")
          WshShell.Run """" & Replace(WScript.ScriptFullName, "launcher.vbs", "spark-engine.exe") & """", 0, False
          VBSEOF

      - name: Create NSIS installer script
        shell: bash
        env:
          VERSION: ${{ github.event.release.tag_name }}
        run: |
          cat > installer.nsi <<NSIEOF
          !include "MUI2.nsh"

          Name "Spark"
          OutFile "Spark-${VERSION}-windows-x86_64-setup.exe"
          InstallDir "\$PROGRAMFILES64\\Cognisn\\Spark"
          RequestExecutionLevel admin
          BrandingText "Spark by Cognisn"

          !define MUI_ICON "assets\\icons\\spark.ico"
          !define MUI_UNICON "assets\\icons\\spark.ico"

          ; Custom branded images
          !define MUI_HEADERIMAGE
          !define MUI_HEADERIMAGE_BITMAP "assets\\installer\\nsis-header.bmp"
          !define MUI_HEADERIMAGE_RIGHT
          !define MUI_WELCOMEFINISHPAGE_BITMAP "assets\\installer\\nsis-welcome.bmp"
          !define MUI_UNWELCOMEFINISHPAGE_BITMAP "assets\\installer\\nsis-welcome.bmp"

          !define MUI_WELCOMEPAGE_TITLE "Welcome to Spark Setup"
          !define MUI_WELCOMEPAGE_TEXT "This will install Spark — Secure Personal AI Research Kit by Cognisn.\$\\r\$\\n\$\\r\$\\nSpark provides a multi-provider LLM interface with MCP tool integration, autonomous actions, and a built-in security layer.\$\\r\$\\n\$\\r\$\\nClick Next to continue."
          !define MUI_FINISHPAGE_TITLE "Spark Installation Complete"
          !define MUI_FINISHPAGE_TEXT "Spark has been installed successfully.\$\\r\$\\n\$\\r\$\\nClick Finish to close the installer."
          !define MUI_FINISHPAGE_RUN "\$INSTDIR\\launcher.vbs"
          !define MUI_FINISHPAGE_RUN_TEXT "Launch Spark"

          !insertmacro MUI_PAGE_WELCOME
          !insertmacro MUI_PAGE_DIRECTORY
          !insertmacro MUI_PAGE_INSTFILES
          !insertmacro MUI_PAGE_FINISH

          !insertmacro MUI_UNPAGE_CONFIRM
          !insertmacro MUI_UNPAGE_INSTFILES

          !insertmacro MUI_LANGUAGE "English"

          Section "Install"
            ; Clean previous installation (preserve user config in %APPDATA%\spark)
            Delete "\$INSTDIR\\spark-engine.exe"
            Delete "\$INSTDIR\\spark.exe"
            Delete "\$INSTDIR\\launcher.vbs"
            Delete "\$INSTDIR\\spark.bat"
            Delete "\$INSTDIR\\spark.ico"
            Delete "\$INSTDIR\\Uninstall.exe"
            RMDir /r "\$INSTDIR\\wheels"

            ; Clear PyApp cache so the new wheel is extracted fresh
            RMDir /r "\$LOCALAPPDATA\\pyapp"

            ; Check and install Visual C++ Redistributable if needed
            ReadRegStr \$0 HKLM "SOFTWARE\\Microsoft\\VisualStudio\\14.0\\VC\\Runtimes\\X64" "Installed"
            StrCmp \$0 "1" vcredist_done
              DetailPrint "Installing Visual C++ Redistributable..."
              NSISdl::download "https://aka.ms/vs/17/release/vc_redist.x64.exe" "\$TEMP\\vc_redist.x64.exe"
              Pop \$0
              StrCmp \$0 "success" vcredist_install
                DetailPrint "Warning: Could not download VC++ Redistributable. Some features may not work."
                Goto vcredist_done
              vcredist_install:
                ExecWait '"\$TEMP\\vc_redist.x64.exe" /install /quiet /norestart' \$0
                DetailPrint "VC++ Redistributable installer returned: \$0"
                Delete "\$TEMP\\vc_redist.x64.exe"
            vcredist_done:

            ; Install new files
            SetOutPath \$INSTDIR
            File "binary\\spark-windows-x86_64.exe"
            Rename "\$INSTDIR\\spark-windows-x86_64.exe" "\$INSTDIR\\spark-engine.exe"
            File "launcher.vbs"
            File "assets\\icons\\spark.ico"

            ; Shortcuts use the VBS launcher to hide the console window
            CreateDirectory "\$SMPROGRAMS\\Cognisn"
            CreateShortCut "\$SMPROGRAMS\\Cognisn\\Spark.lnk" "wscript.exe" '"\$INSTDIR\\launcher.vbs"' "\$INSTDIR\\spark.ico"
            CreateShortCut "\$DESKTOP\\Spark.lnk" "wscript.exe" '"\$INSTDIR\\launcher.vbs"' "\$INSTDIR\\spark.ico"

            WriteUninstaller "\$INSTDIR\\Uninstall.exe"

            WriteRegStr HKLM "Software\\Microsoft\\Windows\\CurrentVersion\\Uninstall\\Spark" "DisplayName" "Spark"
            WriteRegStr HKLM "Software\\Microsoft\\Windows\\CurrentVersion\\Uninstall\\Spark" "UninstallString" "\$INSTDIR\\Uninstall.exe"
            WriteRegStr HKLM "Software\\Microsoft\\Windows\\CurrentVersion\\Uninstall\\Spark" "Publisher" "Cognisn"
            WriteRegStr HKLM "Software\\Microsoft\\Windows\\CurrentVersion\\Uninstall\\Spark" "DisplayIcon" "\$INSTDIR\\spark.ico"
            WriteRegStr HKLM "Software\\Microsoft\\Windows\\CurrentVersion\\Uninstall\\Spark" "DisplayVersion" "${VERSION}"
          SectionEnd

          Section "Uninstall"
            ; Remove PyApp cached environment
            RMDir /r "\$LOCALAPPDATA\\pyapp"

            ; Remove all installed files
            Delete "\$INSTDIR\\spark-engine.exe"
            Delete "\$INSTDIR\\launcher.vbs"
            Delete "\$INSTDIR\\spark.ico"
            Delete "\$INSTDIR\\Uninstall.exe"
            RMDir "\$INSTDIR"
            Delete "\$SMPROGRAMS\\Cognisn\\Spark.lnk"
            Delete "\$DESKTOP\\Spark.lnk"
            RMDir "\$SMPROGRAMS\\Cognisn"
            DeleteRegKey HKLM "Software\\Microsoft\\Windows\\CurrentVersion\\Uninstall\\Spark"
          SectionEnd
          NSIEOF

      - name: Install NSIS
        run: |
          choco install nsis -y
          echo "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Append
          echo "C:\Program Files\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Build installer
        shell: cmd
        run: makensis installer.nsi

      - name: Sign Windows installer
        shell: bash
        env:
          SSL_COM_USERNAME: ${{ secrets.SSL_COM_USERNAME }}
          SSL_COM_PASSWORD: ${{ secrets.SSL_COM_PASSWORD }}
          SSL_COM_TOTP_SECRET: ${{ secrets.SSL_COM_TOTP_SECRET }}
          SSL_COM_CREDENTIAL_ID: ${{ secrets.SSL_COM_CREDENTIAL_ID }}
        run: |
          INSTALLER=$(ls *-setup.exe | head -1)
          echo "Installer to sign: $INSTALLER"

          # Skip signing if secrets are not configured
          if [ -z "$SSL_COM_USERNAME" ] || [ -z "$SSL_COM_CREDENTIAL_ID" ]; then
            echo "::warning::SSL.com secrets not configured — skipping installer signing"
            exit 0
          fi

          # Download CodeSignTool
          curl -L --retry 3 --retry-delay 5 -o CodeSignTool.zip https://www.ssl.com/download/codesigntool-for-windows/
          # Verify we got a valid zip (not an HTML error page)
          file CodeSignTool.zip | grep -q "Zip archive" || { echo "::error::Downloaded file is not a valid zip"; file CodeSignTool.zip; exit 1; }
          unzip -o CodeSignTool.zip -d CodeSignTool

          CST_BAT=$(find CodeSignTool -name "CodeSignTool.bat" | head -1)
          CST_DIR=$(dirname "$CST_BAT")

          # Sign the installer — output to temp dir then move back
          SIGNED_DIR="${GITHUB_WORKSPACE}/signed_output"
          mkdir -p "$SIGNED_DIR"

          echo "Running CodeSignTool sign on installer..."
          cd "$CST_DIR"
          ./CodeSignTool.bat sign \
            -username="${SSL_COM_USERNAME}" \
            -password="${SSL_COM_PASSWORD}" \
            -totp_secret="${SSL_COM_TOTP_SECRET}" \
            -credential_id="${SSL_COM_CREDENTIAL_ID}" \
            -input_file_path="${GITHUB_WORKSPACE}/${INSTALLER}" \
            -output_dir_path="$SIGNED_DIR" \
            2>&1 | tee signing_output.log

          # Check if signed file was produced
          SIGNED_FILE="$SIGNED_DIR/${INSTALLER}"
          if [ -f "$SIGNED_FILE" ]; then
            echo "Signed installer found, replacing original..."
            cp "$SIGNED_FILE" "${GITHUB_WORKSPACE}/${INSTALLER}"
          else
            echo "::error::Signed installer not found at $SIGNED_FILE"
            ls -la "$SIGNED_DIR/" || true
            exit 1
          fi

          # Verify
          echo "Verifying installer signature..."
          powershell -Command "Get-AuthenticodeSignature '${GITHUB_WORKSPACE}/${INSTALLER}' | Format-List" || true

      - name: Upload installer
        uses: actions/upload-artifact@v5
        with:
          name: spark-windows-installer
          path: "*-setup.exe"


  # Step 6: Publish to PyPI
  publish-pypi:
    needs: build-wheel
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download wheel
        uses: actions/download-artifact@v5
        with:
          name: wheel
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
        continue-on-error: true  # Allow re-releases when version already exists

  # Step 7: Attach all artifacts to the GitHub Release
  attach-release:
    permissions:
      contents: write
    needs:
      - build-binaries
      - create-macos-installer
      - create-windows-installer
      - publish-pypi
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Upload to release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: |
